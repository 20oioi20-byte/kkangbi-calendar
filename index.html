<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🤖 깡비서</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🤖</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;color:#222;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-sec{padding:8px 10px;border-bottom:1px solid #f5f5f5}
.sb-sec-title{font-size:9px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sb-btn{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:11px;color:#444;border:none;background:none;width:100%;text-align:left}
.sb-btn:hover{background:#f5f5f5}
.sb-btn.active{background:#e8f0fe;color:#1a73e8;font-weight:600}
.sb-icon{font-size:13px;width:16px;text-align:center}
.sb-link-item{display:flex;align-items:center;gap:3px;padding:3px 4px;border-radius:5px;margin-bottom:2px}
.sb-link-item:hover{background:#f5f5f5}
.sb-link-btn{flex:1;display:flex;align-items:center;gap:5px;padding:3px 4px;cursor:pointer;font-size:11px;color:#444;border:none;background:none;text-align:left;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sb-link-btn:hover{color:#1a73e8}
.sb-drag-handle,.link-drag-handle,.chip-sort-handle{cursor:grab;color:#ccc;flex-shrink:0}
.sb-drag-handle{font-size:12px;padding:0 2px}.link-drag-handle{font-size:14px}.chip-sort-handle{font-size:9px;padding:0 1px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:7px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}
.period-label{font-size:14px;font-weight:700;min-width:100px}
.nav-btn{background:none;border:1px solid #ddd;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.add-btn{background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;font-weight:600}
.search-box{padding:4px 9px;border:1px solid #ddd;border-radius:16px;font-size:11px;outline:none;width:150px;font-family:inherit}
.search-box:focus{border-color:#1a73e8}
.quick-bar{background:#fff;border-bottom:1px solid #e8f0fe;padding:6px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.quick-bar input{flex:1;padding:6px 10px;border:1.5px solid #c5d8fb;border-radius:20px;font-size:12px;font-family:inherit;outline:none;background:#f8fbff}
.quick-bar input:focus{border-color:#1a73e8;background:#fff}
.quick-bar-btn{background:#1a73e8;color:#fff;border:none;border-radius:20px;padding:5px 14px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap}
.today-panel{background:#fff;border-bottom:1px solid #e8f0fe;padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;min-height:32px}
.tp-title{font-size:10px;font-weight:700;color:#1a73e8;white-space:nowrap}
.tp-chip{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:10px}
.f-btn{padding:3px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:10px;color:#555;width:100%;text-align:left;margin-bottom:2px}
.f-btn:hover{background:#f5f5f5}
.f-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd;border-radius:8px;overflow:hidden;border:1px solid #ddd}
.cal-head{background:#f8f9fa;padding:5px;text-align:center;font-size:10px;font-weight:700;color:#666}
.cal-head.sun{color:#d32f2f}.cal-head.sat{color:#1557b0}
.cal-cell{background:#fff;padding:3px;height:130px;overflow:hidden;position:relative}
.cal-cell:hover{background:#fafbff}
.cal-cell.other{background:#fafafa}.cal-cell.other .dn{color:#ccc}
.cal-cell.today .dn{background:#1a73e8;color:#fff!important;border-radius:50%;font-size:10px}
.cal-cell.drag-over{background:#e8f0fe!important;outline:2px dashed #1a73e8}
.cal-events{overflow-y:auto;max-height:95px}
.dn{font-size:10px;font-weight:600;color:#333;width:18px;height:18px;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.holiday-label{font-size:8px;color:#d32f2f;padding:0 2px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.more-btn{font-size:8px;color:#1a73e8;cursor:pointer;padding:1px 3px;background:#e8f0fe;border-radius:3px;border:none;width:100%;text-align:left;margin-top:1px}
.chip-wrap{display:flex;align-items:center;gap:2px;margin-bottom:1px;position:relative}
.sb-link-item.d-over,.link-manage-row.d-over,.chip-wrap.d-over{border-top:2px solid #1a73e8}
.chip-chk{width:11px;height:11px;flex-shrink:0;cursor:pointer;accent-color:#188038;margin:0}
.chip{font-size:9px;padding:1px 4px;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;flex:1;min-width:0;max-width:130px;user-select:none}
.chip.important{box-shadow:0 0 0 1.5px #fbbc04;font-weight:700}
.chip.search-match{outline:2px solid #fbbc04}
.chip-status{font-size:9px;cursor:pointer;flex-shrink:0;opacity:.6;line-height:1}
.chip-status:hover{opacity:1}
.memo-icon{font-size:8px;flex-shrink:0;opacity:.6}
.memo-tooltip{display:none;position:fixed;z-index:500;background:#333;color:#fff;font-size:10px;padding:5px 8px;border-radius:6px;white-space:pre-wrap;max-width:200px;line-height:1.5;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
@media(hover:hover){.chip-wrap:hover .memo-tooltip{display:block}}
.scard{background:#fff;border-radius:9px;border:1px solid #e0e0e0;padding:12px;margin-bottom:10px}
.scard h4{font-size:12px;font-weight:700;margin-bottom:8px}
.wstat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.wstat{background:#f8f9fa;border-radius:7px;padding:7px;text-align:center}
.wstat-num{font-size:16px;font-weight:700;color:#1a73e8}
.wstat-lbl,.ws-lbl{font-size:9px;color:#888;margin-top:1px}
.rrow{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.rrow:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;background:#e8f0fe;color:#1557b0}
.badge.applied{background:#e6f4ea;color:#1b5e20}
.badge.notapplied{background:#f1f3f4;color:#999}
.iBtn{background:none;border:none;cursor:pointer;font-size:12px;color:#ccc;padding:1px 3px}
.iBtn:hover{color:#333}
.loading{display:flex;align-items:center;gap:7px;color:#aaa;font-size:11px;padding:7px 0}
.spin{width:13px;height:13px;border:2px solid #eee;border-top-color:#1a73e8;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.brief-ev{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.brief-ev:last-child{border-bottom:none}
.ai-priority{background:#f8f9fa;border-left:3px solid #1a73e8;border-radius:0 7px 7px 0;padding:9px 11px;font-size:11px;line-height:1.8;white-space:pre-wrap}
.spicker{position:fixed;z-index:300;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:5px;display:flex;flex-direction:column;gap:2px;min-width:130px}
.spicker-item{padding:6px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.spicker-item:hover{background:#f5f5f5}
.client-card{background:#fff;border:1px solid #e0e0e0;border-radius:9px;padding:12px;cursor:pointer}
.client-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.history-item{padding:8px 10px;border-bottom:1px solid #f5f5f5;font-size:11px;line-height:1.6}
.history-item:last-child{border-bottom:none}
.history-date{font-size:9px;color:#aaa;margin-bottom:2px}
#floating-ai{position:fixed;bottom:18px;right:18px;z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
#ai-panel{display:none;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:12px;width:270px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
#ai-fab{width:42px;height:42px;border-radius:50%;background:#1a73e8;color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 3px 10px rgba(26,115,232,.4)}
#sb-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;padding:2px 6px;color:#444}
.link-manage-row{display:flex;align-items:center;gap:4px;padding:5px 0;border-bottom:1px solid #f5f5f5}
.lk-emoji{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px;background:#f8fbff;border:1px solid #c5d8fb;border-radius:8px;padding:8px 12px}
.week-nav-btn{background:none;border:1px solid #c5d8fb;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:12px;color:#1a73e8}
.week-nav-btn:hover{background:#e8f0fe}
.week-nav-label{flex:1;text-align:center;font-size:12px;font-weight:700;color:#1557b0;cursor:pointer;text-decoration:underline dotted}
#toast-el{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;z-index:9999;pointer-events:none;transition:opacity .3s;opacity:0}
#voice-btn{display:none}
.ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ws-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;position:relative;min-height:160px}
.ws-card.d-over{outline:2px dashed #1a73e8;background:#f0f4ff;border-top:1px solid #e0e0e0}
.ws-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:grab}
.ws-card-title{font-size:12px;font-weight:700;color:#333}
.ws-card-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.ws-card:hover .ws-card-actions{opacity:1}
.ws-action-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#aaa;padding:2px 4px}
.ws-metric-row{display:flex;gap:8px;margin-bottom:8px}
.ws-metric{flex:1;background:#f8f9fa;border-radius:7px;padding:8px;text-align:center}
.ws-num{font-size:20px;font-weight:700}
.ws-ev-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.ws-ev-item:last-child{border-bottom:none}
.ws-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ws-ev-chk{width:12px;height:12px;accent-color:#188038;flex-shrink:0;cursor:pointer}
.ws-ev-text{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.ws-ev-time{font-size:10px;color:#aaa;flex-shrink:0}
.ws-dday-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px}
.ws-dday-row:last-child{border-bottom:none}
.ws-dday-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:6px;flex-shrink:0}
.ws-dday-title{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.ws-dday-client{font-size:10px;color:#aaa;flex-shrink:0}
.ws-client-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:11px;cursor:pointer}
.ws-client-row:last-child{border-bottom:none}
.ws-client-row:hover{background:#fafbff}
.ws-client-name{flex:1;font-weight:600}
.ws-prog{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.ws-prog-fill{height:100%;background:#1a73e8}
.ws-chat-box{display:flex;flex-direction:column;height:100%;min-height:200px}
.ws-chat-msgs{flex:1;overflow-y:auto;font-size:11px;margin-bottom:8px;max-height:180px}
.ws-chat-msg{padding:5px 8px;border-radius:7px;margin-bottom:4px;line-height:1.5;max-width:90%;user-select:text;-webkit-user-select:text;cursor:text}
.ws-chat-msg.user{background:#e8f0fe;color:#1557b0;margin-left:auto;text-align:right}
.ws-chat-msg.ai{background:#f8f9fa;color:#333}
.ws-copy-btn{font-size:9px;padding:1px 6px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;color:#888;margin-top:4px;display:inline-block}
.ws-copy-btn:hover{background:#f0f0f0;color:#333}
.ws-chat-input-row{display:flex;gap:4px}
.ws-chat-input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:14px;font-size:11px;font-family:inherit;outline:none}
.ws-chat-input:focus{border-color:#1a73e8}
.ws-chat-send{background:#1a73e8;color:#fff;border:none;border-radius:14px;padding:5px 10px;cursor:pointer;font-size:10px;white-space:nowrap}
.ws-chat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ws-chat-clear{font-size:9px;padding:2px 8px;border:1px solid #f0c0c0;border-radius:10px;background:#fff;color:#d32f2f;cursor:pointer}
.ws-chat-clear:hover{background:#fce8e6}
.ws-chat-cfg{font-size:9px;padding:2px 8px;border:1px solid #cfe0ff;border-radius:10px;background:#fff;color:#1557b0;cursor:pointer}
.ws-chat-cfg:hover{background:#eef4ff}
.ws-settings-panel{background:#f8f9fa;border:1px solid #e8f0fe;border-radius:8px;padding:10px;font-size:11px}
.ws-settings-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0}
.ws-settings-row:last-child{border-bottom:none}
.ws-toggle{width:32px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.ws-toggle.on{background:#1a73e8}.ws-toggle.off{background:#ccc}
.ws-toggle::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s}
.ws-toggle.on::after{left:18px}.ws-toggle.off::after{left:2px}
.rep-item{border:1px solid #e8f0fe;border-radius:8px;margin-bottom:6px;overflow:hidden}
.rep-head{background:#f8fbff;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;color:#1557b0}
.rep-body{padding:8px 12px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:80px;overflow-y:auto}
.draft-box{background:#f8f9fa;border:1px solid #eee;border-radius:7px;padding:9px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:220px;overflow-y:auto;margin-top:7px}
.modal{background:#fff;border-radius:12px;padding:18px;width:440px;max-width:96vw;max-height:88vh;overflow-y:auto;position:relative}
.modal h3{font-size:14px;font-weight:700;margin-bottom:12px;padding-right:22px}
.modal label{display:block;font-size:10px;font-weight:700;color:#888;margin:9px 0 3px}
.modal input,.modal select,.modal textarea{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit}
.modal textarea{resize:vertical;min-height:55px}
.chk-row{display:flex;align-items:center;gap:6px;margin-top:9px}
.chk-row input{width:auto}
.chk-row label{margin:0;font-size:11px;color:#333;font-weight:600}
.mactions{display:flex;gap:6px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap}
.btn-c,.btn-p,.btn-d,.btn-o,.btn-g{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;border:none}
.btn-c{border:1px solid #ddd;background:#fff}
.btn-p{background:#1a73e8;color:#fff;font-weight:700}
.btn-d{background:#d32f2f;color:#fff}
.btn-o{border:1px solid #1a73e8;color:#1a73e8;background:#fff}
.btn-g{background:#188038;color:#fff;font-weight:700}
.xbtn{position:absolute;top:10px;right:12px;background:none;border:none;font-size:17px;cursor:pointer;color:#999}
.drow{display:flex;gap:5px;padding:5px 0;border-bottom:1px solid #f5f5f5;align-items:flex-start}
.dlbl{font-size:10px;color:#aaa;width:52px;flex-shrink:0;padding-top:2px}
.dval{font-size:12px;color:#333;flex:1;line-height:1.5}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center}
@media(max-width:680px){
#sb-toggle{display:inline-flex}
.sidebar{position:fixed;left:0;top:0;height:100vh;z-index:300;transform:translateX(-100%);transition:transform .22s;box-shadow:2px 0 12px rgba(0,0,0,.15)}
.sidebar.open{transform:translateX(0)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:299}
.sb-overlay.open{display:block}
#voice-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:16px;flex-shrink:0;background:#f0f0f0;color:#555}
#voice-btn.listening{background:#d32f2f;color:#fff;animation:pulse .8s infinite}
.ws-grid{grid-template-columns:1fr}
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
/* 공통 유틸 */
.rep-cur{background:#f8fbff;border:1px solid #e8f0fe;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;line-height:1.7;white-space:pre-wrap;max-height:180px;overflow-y:auto}
.sel-sm{padding:5px 8px;border:1px solid #ddd;border-radius:8px;font-size:11px;font-family:inherit}
.empty-msg{color:#ccc;font-size:11px;padding:8px 0}
.flex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ttl-sm{font-size:13px;font-weight:700;color:#333}
.muted{font-size:11px;color:#aaa}
.ai-out{background:#f8f9fa;border:1px solid #eee;border-radius:6px;padding:7px;font-size:10px;line-height:1.7;max-height:150px;overflow-y:auto;white-space:pre-wrap}
.rep-banner{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.fld-lbl{font-size:10px;font-weight:700;color:#888;display:block;margin-bottom:3px}
.fld-in{width:100%;padding:5px;border:1px solid #ddd;border-radius:5px;font-size:11px;font-family:inherit}
.redit-radio{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer}
.redit-chk{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer}
.btn-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.sec-lbl{font-size:11px;font-weight:700;color:#555;margin-bottom:6px}
.hist-box{background:#f8f9fa;border-radius:8px;padding:10px;max-height:260px;overflow-y:auto;margin-bottom:10px}
.ws-link-box{font-size:11px;color:#ccc;padding:8px 0}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="toast-el"></div>
<!-- ═══ 앱 탭 헤더 ═══ -->
<div id="app-tab-bar" style="position:fixed;top:0;left:0;right:0;z-index:400;background:#fff;border-bottom:1px solid #e0e0e0;display:flex;align-items:stretch;height:38px">
  <div style="padding:0 14px;display:flex;align-items:center;font-size:13px;font-weight:700;color:#333;border-right:1px solid #f0f0f0;min-width:110px">🤖 깡비서</div>
  <button id="apptab-cal" onclick="switchApp('cal')" style="padding:0 18px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:#1a73e8;border-bottom:2px solid #1a73e8">📅 캘린더</button>
  <button id="apptab-pl" onclick="switchApp('pl')" style="padding:0 18px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#888;border-bottom:2px solid transparent">💰 손익 관리</button>
</div>
<div id="sb-overlay" class="sb-overlay" onclick="toggleSidebar()"></div>
<div class="app" id="cal-app" style="margin-top:38px">

async function callAI(sys,usr,max=1000,allowCont=false){
 const msgs=Array.isArray(usr)?usr.slice():[{role:'user',content:usr}];

function aiCutoff(){const s=S.aiSettings;if(!s||s.mode!=='period')return'';const d=new Date();d.setMonth(d.getMonth()-(s.months||3));return fmtDate(d);}
function aiScopeArr(arr,getD){const s=S.aiSettings||{mode:'period',months:3,count:50};const a=[...(arr||[])].sort((x,y)=>(getD(x)||'').localeCompare(getD(y)||''));if(s.mode==='all')return a;if(s.mode==='count')return a.slice(-(s.count||50));const cut=aiCutoff();return a.filter(x=>(getD(x)||'')>=cut);}
function aiScopeLabel(){const s=S.aiSettings||{mode:'period',months:3,count:50};return s.mode==='all'?'전체':s.mode==='count'?`최근 ${s.count||50}개`:`최근 ${s.months||3}개월`;}

${wr.map(r=>`[${r.week}] ${(r.content||'').slice(0,250)}`).join('\n')||'없음'}
■ 메모 (${mm.length}건): ${mm.map(m=>(m.text||'').slice(0,80)).join(' / ')||'없음'}
${(S.aiSettings&&S.aiSettings.includePL&&S.pl&&S.pl.records)?buildPLCtx():''}`;
}
// ═══ 손익 AI 컨텍스트 빌더 ═══
function buildPLCtx() {
  if (!S.pl || !S.pl.records) return '';
  const centers = S.pl.centers || [];
  const latestYms = {};
  Object.entries(S.pl.records).forEach(([cid, byYm]) => {
    const yms = Object.keys(byYm||{}).sort();
    if (yms.length) latestYms[cid] = yms[yms.length-1];
  });
  const lines = centers.map(c => {
    const ym = latestYms[c.id];
    if (!ym) return `[${c.name}] 데이터 없음`;
    const rec = S.pl.records[c.id][ym] || {};
    return `[${c.name}] ${ym} 매출:${(rec.revenue||0).toLocaleString()}만원 센터이익:${(rec.centerProfit||0).toLocaleString()}만원 이익률:${rec.revenue?(((rec.centerProfit||0)/(rec.revenue)*100).toFixed(1)):'N/A'}%`;
  }).join('\n');
  return `\n■ 손익 현황 (최근월 센터별 요약):\n${lines||'없음'}`;
}

async function loadS(){
 try{
  const r=await fetch(`${SB_URL}/rest/v1/app_storage?key=eq.ktis_v11&select=value`,
   {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}});
  const d=await r.json();
  if(d&&d[0]&&d[0].value)S={...S,...JSON.parse(d[0].value)};
 }catch(e){}
 ['events','routines','savedPrompts','weeklyReports','dailyReports','memos','wsChatHistory'].forEach(k=>{if(!S[k])S[k]=[];});
 if(!S.typeColors)S.typeColors={};
 if(!S.aiSettings)S.aiSettings={mode:'period',months:3,count:50,autocont:true};
 if(!S.clients||!S.clients.length)S.clients=DEF_CLIENTS;
 if(!S.links||!S.links.length)S.links=DEF_LINKS;
 if(!S.wsCards||!S.wsCards.length)S.wsCards=WS_DEFAULT_CARDS.map(c=>({...c}));
 if(!S._defRoutines){DEF_ROUTINES.forEach(r=>{if(!S.routines.find(x=>x.title===r.title))S.routines.push({...r,applied:false});});S._defRoutines=1;}
 if(!S._rmClients3){S.clients=S.clients.filter(c=>!['KB손보','LG전자','평택','비씨카드','대신증권','농협은행','스카이라이프'].includes(c.name));const ex=S.clients.map(x=>x.name);DEF_CLIENTS.forEach(dc=>{if(!ex.includes(dc.name))S.clients.push(dc);});S._rmClients3=1;}
 S.events.forEach((ev,i)=>{if(ev.order===undefined)ev.order=i;});
}
async function saveS(){
 try{
  await fetch(`${SB_URL}/rest/v1/app_storage`,{
   method:'POST',
   headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},

function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function typeColor(t){return(S.typeColors&&S.typeColors[t])||TYPE_COLORS[t]||TYPE_COLORS.personal;}
function getType(ev){if(ev.type)return ev.type;const t=ev.title||'';
 if(/회의|미팅|간담회|상견례|내방|발대식|점검|컨설팅/.test(t))return'meeting';
 if(/보고|발표|PT|검토|정리/.test(t))return'report';
 if(/결산|세금계산서|청구|성과급|포상|정산|공문|편람|제안서|자료|계약|날인|등록|신청|견적|승계/.test(t))return'document';
 if(ev.cat==='personal')return'personal';return'etc';}
function prevWorkday(ds){let d=new Date(ds);while(HOLIDAYS[fmtDate(d)]||d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);return fmtDate(d);}
function sIcon(ev){return ev.status==='delayed'?'⏩':ev.important?'⭐':'·';}
function evLabel(ev){return`${ev.important?'⭐':''}${ev.time?ev.time+' ':''}${ev.title}${ev.status==='done'?' (완료)':''}`;}
function sortEvs(evs){const o=(a,b)=>(a.order||0)-(b.order||0);return[...evs.filter(e=>e.status!=='done').sort(o),...evs.filter(e=>e.status==='done').sort(o)];}
function getEventsForDate(ds){return S.events.filter(e=>e.date===ds);}
function filterEvs(evs){let r=curClient==='ALL'?evs:evs.filter(ev=>matchClient(ev));if(searchKw)r=r.filter(e=>e.title.toLowerCase().includes(searchKw));return r;}
function matchClient(ev){const cl=S.clients.find(c=>c.name===curClient);return cl?cl.keywords.some(k=>ev.title.includes(k)):false;}
function getDailyDate(off){const d=new Date();d.setDate(d.getDate()+off);return fmtDate(d);}
function getWeekRange(off){const t=new Date();const mon=new Date(t);mon.setDate(t.getDate()-t.getDay()+1+off*7);const fri=new Date(mon);fri.setDate(mon.getDate()+4);return{mon:fmtDate(mon),fri:fmtDate(fri),label:`${fmtDate(mon)} ~ ${fmtDate(fri)}`};}
function diffDays(ds){const t=new Date();t.setHours(0,0,0,0);const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-t)/864e5);}
const nextOrder=ds=>Math.max(0,...getEventsForDate(ds).map(e=>e.order||0))+1;
function newEv(o){return{id:'e_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),title:'',time:'',cat:'work',priority:'보통',memo:'',status:'',statusNote:'',delayedTo:'',important:false,...o};}

function safeCopy(text,ok){const fb=()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-9999px';document.body.appendChild(ta);ta.focus();ta.select();let r=false;try{r=document.execCommand('copy');}catch(e){}document.body.removeChild(ta);showToast(r?(ok||'복사됐습니다.'):'복사 실패');};
 if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>showToast(ok||'복사됐습니다.')).catch(fb);else fb();}

function dStart(e,type,id){DRAG={type,id};e.dataTransfer.effectAllowed='move';e.stopPropagation();}

function moveArr(arr,fid,tid){const fi=arr.findIndex(x=>x.id===fid),ti=arr.findIndex(x=>x.id===tid);if(fi<0||ti<0||fi===ti)return false;const[it]=arr.splice(fi,1);arr.splice(ti,0,it);return true;}

 if(id==='ws-summary'){

<div style="display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:3px"><span>완료율</span><span>${pct}%</span></div><div style="height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden"><div style="height:100%;background:#1a73e8;width:${pct}%"></div></div>
<div style="font-size:11px;margin-top:8px">${hasDr?'<span style="color:#188038">✅ 일일보고 작성완료</span>':'<span style="color:#e65100">⚠️ 일일보고 미작성</span>'}</div>`;}

function chipHtml(ev,ds){
 const isDone=ev.status==='done',cc=isDone?{bg:'#e6f4ea',fg:'#188038'}:typeColor(getType(ev)),isMatch=searchKw&&ev.title.toLowerCase().includes(searchKw);

<span class="chip-sort-handle">⠿</span><input type="checkbox" class="chip-chk" ${isDone?'checked':''} onmousedown="event.stopPropagation()" onclick="event.stopPropagation();toggleDone('${ev.id}')">
<div class="chip${ev.important?' important':''}${isMatch?' search-match':''}" style="background:${cc.bg};color:${cc.fg}" onclick="event.stopPropagation();openDetail('${ev.id}','${ds}')">${evLabel(ev)}</div>
${ev.memo?`<span class="memo-icon">📎</span><div class="memo-tooltip">${esc(ev.memo)}</div>`:''}<span class="chip-status" onclick="event.stopPropagation();openStatusPicker(event,'${ev.id}','${ds}')">${isDone?'':sIcon(ev)}</span></div>`;}
function chipDrop(e,tid,tds){e.preventDefault();dClear('.chip-wrap');if(!DRAG||DRAG.type!=='ev'||DRAG.id===tid){DRAG=null;return;}
 const src=S.events.find(x=>x.id===DRAG.id);DRAG=null;if(!src)return;
 if(src.date!==tds){src.date=tds;saveS();render();return;}
 const sorted=sortEvs(filterEvs(getEventsForDate(tds)));const fi=sorted.findIndex(x=>x.id===src.id),ti=sorted.findIndex(x=>x.id===tid);
 if(fi>=0&&ti>=0){const[it]=sorted.splice(fi,1);sorted.splice(ti,0,it);sorted.forEach((ev,i)=>ev.order=i);}saveS();render();}
function cellDrop(e,ds){e.preventDefault();e.stopPropagation();dClear('.cal-cell','drag-over');if(!DRAG||DRAG.type!=='ev')return;const src=S.events.find(x=>x.id===DRAG.id);DRAG=null;if(src&&src.date!==ds){src.date=ds;saveS();}render();}

function renderMonth(c){

 let cells=[];for(let i=fd-1;i>=0;i--)cells.push({day:pd-i,cur:false,m:cM-1,y:cY});for(let i=1;i<=dim;i++)cells.push({day:i,cur:true,m:cM,y:cY});while(cells.length%7!==0)cells.push({day:cells.length-fd-dim+1,cur:false,m:cM+1,y:cY});
 let g=`<div class="cal-grid">`;DK.forEach((d,i)=>g+=`<div class="cal-head${i===0?' sun':i===6?' sat':''}">${d}</div>`);

  g+=`<div class="cal-cell${cell.cur?'':' other'}${isT?' today':''}" ondragover="event.preventDefault();dClear('.cal-cell','drag-over');this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="cellDrop(event,'${ds}')" onclick="onCellClick(event,'${ds}')">
<div class="dn" style="${isRed&&!isT?'color:#d32f2f;':isSat&&!isT?'color:#1557b0;':''}">${cell.day}</div>
${hol?`<div class="holiday-label">${hol}</div>`:''}
<div class="cal-events">${evs.slice(0,MAX_VISIBLE).map(ev=>chipHtml(ev,ds)).join('')}</div>
${extra>0?`<button class="more-btn" onclick="event.stopPropagation();openDayModal('${ds}')">+${extra}개 더보기</button>`:''}</div>`;});

  const all=[];days.forEach(d=>all.push(...filterEvs(getEventsForDate(fmtDate(d)))));
  const done=all.filter(e=>e.status==='done').length,del=all.filter(e=>e.status==='delayed').length;

<div class="wstat-grid"><div class="wstat"><div class="wstat-num">${all.length}</div><div class="wstat-lbl">전체</div></div><div class="wstat"><div class="wstat-num" style="color:#188038">${done}</div><div class="wstat-lbl">완료</div></div><div class="wstat"><div class="wstat-num" style="color:#e65100">${del}</div><div class="wstat-lbl">연기</div></div></div>

  sortEvs(all).slice(0,6).forEach(ev=>{const cc=typeColor(getType(ev));h+=`<div style="font-size:10px;padding:2px 6px;border-radius:4px;display:flex;gap:4px;background:${cc.bg};color:${cc.fg};${ev.status==='done'?'opacity:.5':''}"><span>${ev.date.slice(5)}</span><span>${evLabel(ev)}</span></div>`;});

 c.innerHTML=h+`</div>`;}

function closePicker(){$('spicker').style.display='none';}
function handlePick(status){
 const t=pickerTarget;closePicker();if(!t)return;pickerTarget=null;const{evId,ds}=t;const ev=S.events.find(e=>e.id===evId);if(!ev)return;
 if(status==='delete'){S.events=S.events.filter(e=>e.id!==evId);saveS();render();return;}
 if(status==='important'){ev.important=!ev.important;saveS();render();return;}
 if(status===''){ev.status='';ev.statusNote='';ev.delayedTo='';saveS();render();return;}
 if(status==='delayed'){delayModal(evId,ds);return;}
 applyStatus(evId,ds,status,'','');}

function applyStatus(id,ds,status,note,delayedTo){
 const ev=S.events.find(e=>e.id===id);if(!ev)return;ev.status=status;ev.statusNote=note;ev.delayedTo=delayedTo;
 if(status==='delayed'&&delayedTo)S.events.push(newEv({title:ev.title,date:delayedTo,time:ev.time||'',cat:ev.cat||'work',type:ev.type||getType(ev),priority:ev.priority||'보통',memo:`[연기] 원래: ${ds}`,important:ev.important||false,order:nextOrder(delayedTo)}));

<div style="display:flex;gap:5px;flex-wrap:wrap">
<button class="btn-o" style="font-size:10px;padding:4px 9px" onclick="applyStatus('${ev.id}','${ds}','done','','');closeModal()">✅ 완료</button>
<button class="btn-o" style="font-size:10px;padding:4px 9px" onclick="toggleImportant('${ev.id}')">${ev.important?'⭐ 중요해제':'⭐ 중요표시'}</button>
<button class="btn-o" style="font-size:10px;padding:4px 9px" onclick="closeModal();delayModal('${ev.id}','${ds}')">⏩ 연기</button></div></div>`,
`<button class="btn-c" onclick="closeModal();openEditEvent('${ev.id}')">✏️ 편집</button><button class="btn-d" onclick="delEvent('${ev.id}')">🗑️ 삭제</button><button class="btn-c" onclick="closeModal()">닫기</button>`,460);}
function delEvent(id){S.events=S.events.filter(e=>e.id!==id);saveS();closeModal();render();}
function toggleImportant(id){const ev=S.events.find(e=>e.id===id);if(ev){ev.important=!ev.important;saveS();closeModal();render();}}
function typeOptions(sel){return Object.keys(TYPE_LABELS).map(k=>`<option value="${k}"${sel===k?' selected':''}>${TYPE_LABELS[k]}</option>`).join('');}
function evForm(ev,isNew){return`<label>제목</label><input id="ev-t" type="text" value="${ev.title||''}" placeholder="일정 제목"${isNew?' oninput="autoType()"':''}><label>날짜</label><input id="ev-d" type="date" value="${ev.date}"><label>시간 (선택)</label><input id="ev-h" type="time" value="${ev.time||''}"><label>업무 유형</label><select id="ev-type"${isNew?' onchange="this.dataset.touched=1"':''}>${typeOptions(ev.type)}</select><label>중요도</label><select id="ev-p">${['보통','높음','낮음'].map(p=>`<option${(ev.priority||'보통')===p?' selected':''}>${p}</option>`).join('')}</select><div class="chk-row"><input type="checkbox" id="ev-imp"${ev.important?' checked':''}><label for="ev-imp">⭐ 중요 일정으로 강조 표시</label></div><label>메모</label><textarea id="ev-m" placeholder="메모 입력 (선택)">${ev.memo||''}</textarea>`;}
function readEvForm(){const type=$('ev-type').value;return{title:V('ev-t'),date:V('ev-d'),time:$('ev-h').value||'',type,cat:type==='personal'?'personal':'work',priority:$('ev-p').value,important:$('ev-imp').checked,memo:V('ev-m')};}
function autoType(){const t=V('ev-t');if(!t)return;const sel=$('ev-type');if(sel&&!sel.dataset.touched)sel.value=getType({title:t});}
function openAddEvent(ds){modal('일정 추가',evForm({date:ds||fmtDate(new Date()),type:'personal'},true),`<button class="btn-c" onclick="closeModal()">취소</button><button class="btn-p" onclick="saveAddEvent()">저장</button>`);}
function saveAddEvent(){const f=readEvForm();if(!f.title||!f.date){showToast('제목과 날짜를 입력해주세요.');return;}S.events.push(newEv({...f,order:nextOrder(f.date)}));saveS();closeModal();render();}
function openEditEvent(id){const ev=S.events.find(e=>e.id===id);if(!ev)return;modal('✏️ 일정 수정',evForm(ev),`<button class="btn-d" onclick="delEvent('${id}')">삭제</button><button class="btn-c" onclick="closeModal()">취소</button><button class="btn-p" onclick="saveEditEv('${id}')">저장</button>`);}
function saveEditEv(id){const ev=S.events.find(e=>e.id===id);if(!ev)return;Object.assign(ev,readEvForm());saveS();closeModal();render();}

// ═══ 루틴 ═══
function renderRoutines(c){
 let h=`<div class="scard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h4>루틴 일정 목록</h4><div style="display:flex;gap:6px"><button class="btn-o" style="font-size:10px;padding:4px 9px" onclick="aiRecommendRoutines()">🤖 루틴 추천</button><button class="add-btn" onclick="openRoutineModal()">+ 루틴 추가</button></div></div><div style="font-size:10px;color:#999;margin-bottom:8px">루틴은 양식만 저장됩니다. <b>"적용"</b> 버튼으로 기간 지정 후 일정이 생성됩니다.</div>`;
 S.routines.forEach(r=>{const dl=r.freq==='weekly'?DN[r.day]+'요일':r.freq==='monthly'?r.day+'일':r.freq==='quarterly'?'분기초':'';
  h+=`<div class="rrow"><span class="badge ${r.applied?'applied':'notapplied'}">${r.applied?'적용됨':'미적용'}</span><span style="flex:1;font-weight:500">${r.title}</span><span style="color:#ccc;font-size:10px">${FL[r.freq]||r.freq} ${dl}</span><button class="btn-g" style="font-size:9px;padding:3px 8px" onclick="openApplyRoutine('${r.id}')">📅 적용</button><button class="iBtn" onclick="openRoutineModal('${r.id}')">✏️</button><button class="iBtn" onclick="delRoutine('${r.id}')">🗑️</button></div>`;});
 if(!S.routines.length)h+=`<div style="color:#ccc;font-size:11px;padding:8px 0">등록된 루틴이 없습니다.</div>`;
 c.innerHTML=h+`</div><div id="routine-recommend-area"></div>`;}
async function aiRecommendRoutines(){
 const area=$('routine-recommend-area');area.innerHTML=`<div class="scard"><div class="loading"><div class="spin"></div>분석 중...</div></div>`;
 const freq={};S.events.forEach(e=>{freq[e.title]=(freq[e.title]||0)+1;});
 const cand=Object.entries(freq).filter(([t,n])=>n>=2&&!S.routines.find(r=>r.title===t)).sort((a,b)=>b[1]-a[1]).slice(0,10);
 if(!cand.length){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#aaa">추천할 패턴 없음</div></div>`;return;}
 try{const recs=pJSON(await callAI('JSON만 반환.',`반복 업무:\n${cand.map(([t,n])=>`- "${t}" (${n}회)`).join('\n')}\n\n루틴 추천 JSON:\n[{"title":"","freq":"weekly또는monthly","day":"","time":"","reason":""}]`,800),[]);
  if(!recs.length){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#aaa">추천 없음</div></div>`;return;}
  window._routineRecs=recs;
  area.innerHTML=`<div class="scard"><h4>🤖 AI 루틴 추천</h4>`+recs.map((r,i)=>`<div class="rrow"><span style="flex:1"><b>${r.title}</b> <span style="font-size:10px;color:#888">${FL[r.freq]||r.freq} ${r.freq==='weekly'?DN[r.day]+'요일':r.day+'일'}</span></span><span style="font-size:10px;color:#aaa;margin-right:6px">${r.reason||''}</span><button class="btn-g" style="font-size:10px;padding:3px 8px" onclick="addRecRoutine(${i})">+ 추가</button></div>`).join('')+`</div>`;
 }catch(e){area.innerHTML=`<div class="scard"><div style="font-size:11px;color:#d32f2f">오류</div></div>`;}}
function addRecRoutine(i){const r=(window._routineRecs||[])[i];if(!r)return;if(S.routines.find(x=>x.title===r.title)){showToast('이미 있습니다.');return;}S.routines.push({id:'rt_'+Date.now(),title:r.title,freq:r.freq||'monthly',day:String(r.day||'1'),time:r.time||'',applied:false});saveS();render();}
function openApplyRoutine(id){const r=S.routines.find(x=>x.id===id);if(!r)return;const ey=new Date();ey.setMonth(ey.getMonth()+3);
 modal(`📅 "${r.title}" 루틴 적용`,`<label>시작일</label><input type="date" id="ap-s" value="${fmtDate(new Date())}"><label>종료일</label><input type="date" id="ap-e" value="${fmtDate(ey)}"></div>`.slice(0,-6),`<button class="btn-c" onclick="closeModal()">취소</button><button class="btn-g" onclick="applyRoutine('${id}')">일정 생성</button>`);}
function applyRoutine(id){
 const r=S.routines.find(x=>x.id===id);if(!r)return;const sd=V('ap-s'),ed=V('ap-e');if(!sd||!ed){showToast('날짜 입력.');return;}
 let created=0;
 for(let d=new Date(sd);d<=new Date(ed);d.setDate(d.getDate()+1)){
  const dow=d.getDay(),dom=d.getDate();let hit=false;
  if(r.freq==='daily')hit=dow!==0&&dow!==6;else if(r.freq==='weekly')hit=parseInt(r.day)===dow;
  else if(r.freq==='monthly')hit=parseInt(r.day)===dom;else if(r.freq==='quarterly')hit=parseInt(r.day)===dom&&[2,5,8,11].includes(d.getMonth());
  if(!hit)continue;
  let ds=fmtDate(d);if(r.freq!=='daily'&&(HOLIDAYS[ds]||dow===0||dow===6))ds=prevWorkday(ds);
  if(S.events.find(e=>e.routineId===r.id&&e.date===ds))continue;
  S.events.push(newEv({routineId:r.id,title:r.title,date:ds,time:r.time||'',type:getType({title:r.title}),order:nextOrder(ds)}));created++;}
 r.applied=true;saveS();closeModal();render();showToast(`✅ ${created}건 생성`);}
function wkOpts(s){return Object.entries(DN).map(([v,n])=>`<option value="${v}"${s===v?' selected':''}>${n}요일</option>`).join('');}
function moOpts(s){let o='';for(let i=1;i<=31;i++)o+=`<option value="${i}"${parseInt(s)===i?' selected':''}>${i}일</option>`;return o;}
function updDF(){const f=$('r-f').value,w=$('r-dw'),sl=$('r-d'),lb=$('r-dl');
 if(f==='daily')w.style.display='none';
 else{w.style.display='';if(f==='weekly'){lb.textContent='요일';sl.innerHTML=wkOpts();}else{lb.textContent='날짜';sl.innerHTML=moOpts();}}}
function openRoutineModal(id){
 const r=id?S.routines.find(x=>x.id===id):null;
 const freq=r?.freq||'daily';const isMo=freq==='monthly'||freq==='quarterly';
 modal(r?'루틴 수정':'루틴 추가',
`<label>제목</label><input id="r-t" type="text" value="${r?.title||''}"><label>주기</label><select id="r-f" onchange="updDF()">${['daily','weekly','monthly','quarterly'].map(f=>`<option value="${f}"${freq===f?' selected':''}>${f==='daily'?'매일(평일)':FL[f]}</option>`).join('')}</select><div id="r-dw"${freq==='daily'?' style="display:none"':''}><label id="r-dl">${isMo?'날짜':'요일'}</label><select id="r-d">${isMo?moOpts(r?.day):wkOpts(r?.day)}</select></div><label>시간 (선택)</label><input id="r-h" type="time" value="${r?.time||''}">`,
`<button class="btn-c" onclick="closeModal()">취소</button><button class="btn-p" onclick="saveRoutine('${id||''}')">저장</button>`);}
function saveRoutine(id){
 const t=V('r-t');if(!t){showToast('제목 입력.');return;}
 const f=$('r-f').value,d=f==='daily'?'0':($('r-d')?.value||'1'),h=$('r-h').value||'';
 const oldR=id?S.routines.find(x=>x.id===id):null;const oldTitle=oldR?.title||'';
 if(id&&oldR){oldR.title=t;oldR.freq=f;oldR.day=String(d);oldR.time=h;}
 else{S.routines.push({id:'rt_'+Date.now(),title:t,freq:f,day:String(d),time:h,applied:false});saveS();closeModal();render();return;}
 saveS();
 const linked=S.events.filter(e=>e.routineId===id);
 if(!linked.length){closeModal();render();return;}
 _rEdit={id,newTitle:t,newFreq:f,newDay:String(d),newTime:h,oldTitle};
 closeModal();showRoutineEditStep2(linked.length,oldTitle,t);}

function showRoutineEditStep2(cnt,oldTitle,newTitle){
 const today=fmtDate(new Date()),ey=new Date();ey.setMonth(ey.getMonth()+3);
 const changed=oldTitle!==newTitle;
 showModal(`<div class="modal" style="width:460px"><button class="xbtn" onclick="closeModal();render()">×</button><h3>루틴 수정 — 2단계</h3>
<div style="font-size:11px;color:#aaa;margin-bottom:12px">연결된 일정 <b style="color:#1a73e8">${cnt}건</b>을 어떻게 처리할까요?</div>
<div style="display:flex;flex-direction:column;gap:8px">
<label class="redit-radio"><input type="radio" name="redit" value="keep" checked onclick="$('redit-range').style.display='none'"><div><div style="font-size:12px;font-weight:600">양식만 수정</div><div class="muted">기존 적용된 일정 그대로 유지</div></div></label>
<label class="redit-radio"><input type="radio" name="redit" value="range" onclick="$('redit-range').style.display='block'"><div><div style="font-size:12px;font-weight:600">기간 지정 일괄 수정</div><div class="muted">선택한 기간의 연결 일정을 수정</div></div></label>
</div>
<div id="redit-range" style="display:none;margin-top:10px;background:#f8fbff;border:1px solid #c5d8fb;border-radius:8px;padding:10px">
<div style="display:flex;gap:8px;margin-bottom:8px">
<div style="flex:1"><label class="fld-lbl">시작일</label><input type="date" id="redit-s" value="${today}" class="fld-in"></div>
<div style="flex:1"><label class="fld-lbl">종료일</label><input type="date" id="redit-e" value="${fmtDate(ey)}" class="fld-in"></div></div>
<div style="display:flex;flex-direction:column;gap:5px">
<label class="redit-chk"><input type="checkbox" id="redit-chk-title"${changed?' checked':''} style="accent-color:#1a73e8"> 제목 변경 (${esc(oldTitle)} → <b>${esc(newTitle)}</b>)</label>
<label class="redit-chk"><input type="checkbox" id="redit-chk-day" style="accent-color:#1a73e8"> 일자 이동 (새 주기/요일로 재조정)</label>
<label class="redit-chk"><input type="checkbox" id="redit-chk-done" checked style="accent-color:#1a73e8"> 완료된 일정은 제외</label>
</div></div>
<div class="mactions"><button class="btn-c" onclick="closeModal();render()">건너뛰기</button><button class="btn-p" onclick="applyRoutineEdit()">적용</button></div></div>`);}

function applyRoutineEdit(){
 const p=_rEdit;if(!p)return;
 const mode=document.querySelector('input[name="redit"]:checked')?.value||'keep';
 if(mode==='keep'){closeModal();render();return;}
 const sd=V('redit-s'),ed=V('redit-e');if(!sd||!ed){showToast('기간을 입력해주세요.');return;}
 const chkTitle=$('redit-chk-title')?.checked,chkDay=$('redit-chk-day')?.checked,exDone=$('redit-chk-done')?.checked;
 let cnt=0;
 S.events.filter(e=>e.routineId===p.id&&e.date>=sd&&e.date<=ed).forEach(ev=>{
  if(exDone&&ev.status==='done')return;
  if(chkTitle)ev.title=p.newTitle;
  if(chkDay){
   const d=new Date(ev.date);
   if(p.newFreq==='weekly'){d.setDate(d.getDate()+(parseInt(p.newDay)-d.getDay()));let nd=fmtDate(d);if(HOLIDAYS[nd]||d.getDay()===0||d.getDay()===6)nd=prevWorkday(nd);ev.date=nd;}
   else if(p.newFreq==='monthly'||p.newFreq==='quarterly'){d.setDate(parseInt(p.newDay));let nd=fmtDate(d);if(HOLIDAYS[nd]||d.getDay()===0||d.getDay()===6)nd=prevWorkday(nd);ev.date=nd;}
  }
  if(p.newTime)ev.time=p.newTime;cnt++;});
 _rEdit=null;saveS();closeModal();render();showToast(`✅ ${cnt}건 수정 완료`);}

function delRoutine(id){
 const r=S.routines.find(x=>x.id===id);if(!r)return;
 const linked=S.events.filter(e=>e.routineId===id&&e.status!=='done');
 const today=fmtDate(new Date()),ey=new Date();ey.setMonth(ey.getMonth()+3);
 showModal(`<div class="modal" style="width:460px"><button class="xbtn" onclick="closeModal()">×</button><h3>🗑️ "${esc(r.title)}" 루틴 삭제</h3>
<div style="font-size:11px;color:#aaa;margin-bottom:12px">연결된 미완료 일정 <b style="color:#e65100">${linked.length}건</b>을 어떻게 처리할까요?</div>
<div style="display:flex;flex-direction:column;gap:8px">
<label class="redit-radio"><input type="radio" name="rdel" value="keep" checked onclick="$('rdel-range').style.display='none'"><div><div style="font-size:12px;font-weight:600">양식만 삭제</div><div class="muted">기존 적용된 일정 전부 유지</div></div></label>
<label class="redit-radio"><input type="radio" name="rdel" value="range" onclick="$('rdel-range').style.display='block'"><div><div style="font-size:12px;font-weight:600">기간 지정해서 삭제</div><div class="muted">선택한 기간의 연결 일정만 삭제</div></div></label>
<label class="redit-radio"><input type="radio" name="rdel" value="future" onclick="$('rdel-range').style.display='none'"><div><div style="font-size:12px;font-weight:600">오늘 이후 미완료 전체 삭제</div><div class="muted">오늘 이후 미완료 일정 ${linked.length}건 삭제</div></div></label>
</div>
<div id="rdel-range" style="display:none;margin-top:10px;background:#fff8f8;border:1px solid #ffcdd2;border-radius:8px;padding:10px">
<div style="display:flex;gap:8px;margin-bottom:8px">
<div style="flex:1"><label class="fld-lbl">시작일</label><input type="date" id="rdel-s" value="${today}" class="fld-in"></div>
<div style="flex:1"><label class="fld-lbl">종료일</label><input type="date" id="rdel-e" value="${fmtDate(ey)}" class="fld-in"></div></div>
<label class="redit-chk"><input type="checkbox" id="rdel-chk-done" checked style="accent-color:#1a73e8"> 완료된 일정은 제외</label>
</div>
<div class="mactions"><button class="btn-c" onclick="closeModal()">취소</button><button class="btn-d" onclick="execDelRoutine('${id}')">삭제 실행</button></div></div>`);}

function execDelRoutine(id){
 const mode=document.querySelector('input[name="rdel"]:checked')?.value||'keep';
 const today=fmtDate(new Date());const before=S.events.length;
 if(mode==='range'){
  const sd=V('rdel-s'),ed=V('rdel-e');if(!sd||!ed){showToast('기간을 입력해주세요.');return;}
  const exDone=$('rdel-chk-done')?.checked;
  S.events=S.events.filter(e=>{if(e.routineId!==id)return true;if(e.date<sd||e.date>ed)return true;if(exDone&&e.status==='done')return true;return false;});
 } else if(mode==='future'){
  S.events=S.events.filter(e=>!(e.routineId===id&&e.date>=today&&e.status!=='done'));
 }
 const cnt=before-S.events.length;
 S.routines=S.routines.filter(r=>r.id!==id);
 saveS();closeModal();render();
 showToast(cnt>0?`✅ 루틴 삭제 완료 (일정 ${cnt}건 함께 삭제)`:'✅ 루틴 양식 삭제 완료');}

// ═══ 고객사 ═══
function renderClients(c){
 let h=`<div class="flex-head"><h3 class="ttl-sm">🏢 고객사 관리</h3><button class="add-btn" onclick="openAddClient()">+ 고객사 추가</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">`;
 S.clients.forEach(cl=>{h+=`<div class="client-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="font-size:13px;font-weight:700;cursor:pointer" onclick="openClientDetail('${cl.id}')">🏢 ${cl.name}</div><button class="btn-d" style="font-size:10px;padding:2px 7px" onclick="confirmDelClient('${cl.id}')">삭제</button></div><div style="font-size:10px;color:#aaa;cursor:pointer" onclick="openClientDetail('${cl.id}')">히스토리 ${(cl.history||[]).length}건</div></div>`;});
 c.innerHTML=h+`</div>`;}
function openClientDetail(id){
 const cl=S.clients.find(x=>x.id===id);if(!cl)return;const hist=cl.history||[];
 modal(`🏢 ${cl.name}`,
`<div class="btn-row"><button class="btn-o" style="font-size:10px;padding:4px 10px" onclick="setClient('${cl.name}');closeModal()">📅 일정 보기</button><button class="btn-o" style="font-size:10px;padding:4px 10px" onclick="openEditClient('${cl.id}')">✏️ 수정</button><button class="btn-d" style="font-size:10px;padding:4px 10px" onclick="confirmDelClient('${cl.id}');closeModal()">🗑️ 삭제</button></div>
<div class="sec-lbl">📋 운영 히스토리</div>
<div class="hist-box">${hist.length?hist.map((hh,i)=>`<div class="history-item"><div class="history-date">${hh.date}</div><div style="white-space:pre-wrap">${hh.text}</div><button class="iBtn" style="margin-top:3px;font-size:10px;color:#d32f2f" onmousedown="deleteHistory('${id}',${i})">삭제</button></div>`).join(''):'<div class="empty-msg">히스토리가 없습니다.</div>'}</div>
<textarea id="hist-inp" style="min-height:80px" placeholder="운영 관련 내용을 자유롭게 기록하세요..."></textarea>`,
`<button class="btn-c" onclick="closeModal()">닫기</button><button class="btn-p" onclick="addHistory('${id}')">기록 저장</button>`,520);}
function addHistory(cId){const txt=V('hist-inp');if(!txt)return;const cl=S.clients.find(x=>x.id===cId);if(!cl)return;if(!cl.history)cl.history=[];cl.history.unshift({date:fmtDate(new Date()),text:txt});saveS();closeModal();openClientDetail(cId);}
function deleteHistory(cId,i){const cl=S.clients.find(x=>x.id===cId);if(!cl?.history)return;cl.history.splice(i,1);saveS();closeModal();openClientDetail(cId);}

function saveClient(id){
 const name=V('cl-name');if(!name){showToast('고객사명을 입력해주세요.');return;}
 const kw=V('cl-kw').split(',').map(k=>k.trim()).filter(k=>k);
 if(id){const cl=S.clients.find(x=>x.id===id);if(cl){cl.name=name;cl.keywords=kw.length?kw:[name];}}
 else S.clients.push({id:'c_'+Date.now(),name,keywords:kw.length?kw:[name],history:[]});

async function runQuickBar(){
 const text=V('qi-bar');if(!text){showToast('내용을 입력해주세요.');return;}
 loadingModal('✍️ AI 분석 중...','내용 분류 중...');

`오늘:${fmtDate(new Date())} 고객사:${S.clients.map(c=>c.name).join(', ')}\n입력:"${text}"\nJSON으로만 분류:{"items":[{"type":"schedule","description":"설명","data":{"title":"","date":"YYYY-MM-DD","time":"","priority":"보통"}},{"type":"client_history","description":"설명","data":{"clientName":"","text":""}},{"type":"daily_report","description":"설명","data":{"date":"YYYY-MM-DD","content":""}},{"type":"weekly_report","description":"설명","data":{"week":"YYYY-MM-DD ~ YYYY-MM-DD","content":""}},{"type":"memo","description":"설명","data":{"text":""}}]}\n규칙:해당 type만 포함.날짜는 오늘기준변환.고객사명은목록에서매핑.JSON외텍스트금지.`,2000);

  _qbItems=parsed.items;closeModal();showQuickBarConfirm(parsed.items);
 }catch(e){console.error(e);closeModal();showToast('오류가 발생했습니다.');}}
function qbTypeOptions(sel){const T={schedule:'📅 일정 등록',client_history:'🏢 고객사 히스토리',daily_report:'📋 일일보고',weekly_report:'📋 주간보고',memo:'📌 메모'};return Object.keys(T).map(k=>`<option value="${k}"${sel===k?' selected':''}>${T[k]}</option>`).join('');}
function qbClientOptions(sel){return `<option value=""${!sel?' selected':''}>(직접입력)</option>`+S.clients.map(c=>`<option value="${c.name}"${sel===c.name?' selected':''}>${c.name}</option>`).join('');}
function qbFields(i,it){
 const d=it.data||{};
 if(it.type==='schedule')return `<label>제목</label><input id="qf-title-${i}" value="${(d.title||'').replace(/"/g,'&quot;')}"><div style="display:flex;gap:6px"><div style="flex:1"><label>날짜</label><input type="date" id="qf-date-${i}" value="${d.date||fmtDate(new Date())}"></div><div style="flex:1"><label>시간</label><input type="time" id="qf-time-${i}" value="${d.time||''}"></div></div>`;
 if(it.type==='client_history'){const inList=S.clients.some(c=>c.name===d.clientName);return `<label>고객사 (선택)</label><select id="qf-clientsel-${i}" onchange="qbClientSelChange(${i})">${qbClientOptions(inList?d.clientName:'')}</select><input id="qf-client-${i}" value="${(d.clientName||'').replace(/"/g,'&quot;')}" placeholder="고객사명 직접입력"${inList?' style="display:none"':''}><label>기록 내용</label><textarea id="qf-text-${i}" style="min-height:50px">${esc(d.text||'')}</textarea>`;}
 if(it.type==='daily_report')return `<label>날짜</label><input type="date" id="qf-date-${i}" value="${d.date||fmtDate(new Date())}"><label>보고 내용</label><textarea id="qf-content-${i}" style="min-height:60px">${esc(d.content||'')}</textarea>`;
 if(it.type==='weekly_report')return `<label>주차 (YYYY-MM-DD ~ YYYY-MM-DD)</label><input id="qf-week-${i}" value="${(d.week||getWeekRange(0).label).replace(/"/g,'&quot;')}"><label>보고 내용</label><textarea id="qf-content-${i}" style="min-height:60px">${esc(d.content||'')}</textarea>`;
 return `<label>메모 내용</label><textarea id="qf-text-${i}" style="min-height:50px">${esc(d.text||'')}</textarea>`;
}
function qbClientSelChange(i){const sel=$('qf-clientsel-'+i),inp=$('qf-client-'+i);if(!sel||!inp)return;if(sel.value){inp.value=sel.value;inp.style.display='none';}else{inp.value='';inp.style.display='';inp.focus();}}
function qbTypeChange(i){const t=$('qf-type-'+i)?.value;if(!t)return;_qbItems[i].type=t;_qbItems[i].data=_qbItems[i].data||{};const fc=$('qf-fields-'+i);if(fc)fc.innerHTML=qbFields(i,_qbItems[i]);}
function showQuickBarConfirm(items){
 const rows=items.map((it,i)=>`<div style="border:1px solid #e0e0e0;border-radius:8px;padding:10px;margin-bottom:8px;background:#fff"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><input type="checkbox" id="qb-chk-${i}" checked style="width:14px;height:14px;accent-color:#1a73e8;flex-shrink:0"><select id="qf-type-${i}" onchange="qbTypeChange(${i})" style="flex:1;padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:11px;font-family:inherit">${qbTypeOptions(it.type)}</select></div>${it.description?`<div style="font-size:10px;color:#aaa;margin-bottom:6px;padding-left:22px">💬 ${it.description}</div>`:''}<div id="qf-fields-${i}">${qbFields(i,it)}</div></div>`).join('');
 modal('✍️ AI 분류 결과',`<div style="font-size:11px;color:#aaa;margin-bottom:10px">저장 위치와 내용을 확인·수정하고 저장하세요. 타입을 바꾸면 입력 항목도 바뀝니다.</div><div style="max-height:420px;overflow-y:auto">${rows}</div>`,`<button class="btn-c" onclick="closeModal()">취소</button><button class="btn-p" onclick="applyQuickBarItems()">✅ 선택 항목 저장</button>`,500);
}
function applyQuickBarItems(){
 let saved=[];
 _qbItems.forEach((it,i)=>{
  if(!$('qb-chk-'+i)?.checked)return;const type=$('qf-type-'+i)?.value||it.type;
  if(type==='schedule'){const title=V('qf-title-'+i),date=V('qf-date-'+i);if(!title||!date){return;}S.events.push(newEv({title,date,time:$('qf-time-'+i)?.value||'',type:getType({title}),cat:getType({title})==='personal'?'personal':'work',priority:'보통',order:nextOrder(date)}));saved.push('일정');}
  else if(type==='client_history'){const cname=V('qf-client-'+i)||$('qf-clientsel-'+i)?.value||'';const text=V('qf-text-'+i);if(!cname||!text){return;}let cl=S.clients.find(c=>c.name===cname||c.keywords.some(k=>cname.includes(k)||k.includes(cname)));if(!cl){cl={id:'c_'+Date.now()+'_'+i,name:cname,keywords:[cname],history:[]};S.clients.push(cl);}if(!cl.history)cl.history=[];cl.history.unshift({date:fmtDate(new Date()),text});saved.push('고객사 히스토리');}
  else if(type==='daily_report'){const date=V('qf-date-'+i),content=V('qf-content-'+i);if(!date||!content){return;}upsertDaily(date,content,true);saved.push('일일보고');}
  else if(type==='weekly_report'){const week=V('qf-week-'+i),content=V('qf-content-'+i);if(!week||!content){return;}upsertWeekly(week,content,true);saved.push('주간보고');}
  else if(type==='memo'){const text=V('qf-text-'+i);if(!text){return;}S.memos.push({id:'m_'+Date.now()+'_'+i,text,date:fmtDate(new Date())});saved.push('메모');}});
 _qbItems=[];saveS();closeModal();$('qi-bar').value='';render();
 showToast(saved.length?`✅ 저장 완료: ${[...new Set(saved)].join(', ')}`:'저장된 항목이 없습니다.');}
async function runScheduleOnly(text){
 loadingModal('✍️ AI 분석 중...','분석 중...');
 try{const parsed=pJSON(await callAI('일정 텍스트를 JSON으로 변환. JSON 배열만 반환.',`오늘:${fmtDate(new Date())}. 일정추출 JSON배열:\n${text}\n형식:[{"title":"","date":"YYYY-MM-DD","time":"HH:MM또는빈문자열","priority":"보통"}]`,1500),[]);
  if(!parsed.length){showToast('인식된 내용이 없습니다.');closeModal();return;}
  let added=0;parsed.forEach(ev=>{if(!ev.title||!ev.date)return;S.events.push(newEv({title:ev.title,date:ev.date,time:ev.time||'',type:getType({title:ev.title}),cat:getType({title:ev.title})==='personal'?'personal':'work',priority:ev.priority||'보통',order:nextOrder(ev.date)}));added++;});
  saveS();closeModal();$('qi-bar').value='';render();if(added)showToast(`✅ ${added}개 일정 등록됐습니다.`);
 }catch(e){showToast('오류.');closeModal();}}

// ═══ 음성 입력 ═══
function toggleVoice(){_isListening?stopVoice():startVoice();}
function startVoice(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){showToast('이 브라우저는 음성 인식을 지원하지 않아요.');return;}
 _recognition=new SR();Object.assign(_recognition,{lang:'ko-KR',continuous:false,interimResults:true,maxAlternatives:3});
 const btn=$('voice-btn');
 _recognition.onstart=()=>{_isListening=true;btn.classList.add('listening');btn.textContent='⏹';};
 _recognition.onresult=e=>{
  let fin='',inter='';
  for(let i=e.resultIndex;i<e.results.length;i++){const res=e.results[i];
   if(res.isFinal){let best=res[0].transcript;for(let j=0;j<res.length;j++){if(VOICE_TRIGGERS.some(t=>res[j].transcript.includes(t))){best=res[j].transcript;break;}}fin+=best;}
   else inter+=res[0].transcript;}
  const inp=$('qi-bar');if(inp)inp.value=fin||inter;
  if(fin&&VOICE_TRIGGERS.some(t=>fin.includes(t))){let clean=fin;VOICE_TRIGGERS.forEach(t=>{clean=clean.replace(new RegExp(t,'g'),'');});if(inp)inp.value=clean.trim();stopVoice();setTimeout(runQuickBar,300);}};
 _recognition.onerror=e=>{stopVoice();if(e.error==='not-allowed')showToast('마이크 권한을 허용해주세요.');else if(e.error==='no-speech')showToast('음성이 인식되지 않았어요.');};
 _recognition.onend=stopVoice;
 try{_recognition.start();}catch(e){stopVoice();}}
function stopVoice(){_isListening=false;const btn=$('voice-btn');if(btn){btn.classList.remove('listening');btn.textContent='🎤';}if(_recognition){try{_recognition.stop();}catch(e){}}_recognition=null;}

function restoreBackup(){

 let obj;try{obj=JSON.parse(txt);}catch(e){showToast('올바른 형식이 아닙니다. 백업 텍스트 전체를 붙여넣었는지 확인해주세요.');return;}
 if(!obj||typeof obj!=='object'||!Array.isArray(obj.events)){showToast('올바른 백업 데이터가 아닙니다.');return;}
 confirmAction('현재 데이터를 백업 데이터로 교체할까요?\n(현재 데이터는 사라지며 되돌릴 수 없습니다)',async()=>{

function downloadBackup(){
 try{
  const json=JSON.stringify(S);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const n=new Date();
  const fn=`깡비캘린더_백업_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}.json`;
  const a=document.createElement('a');a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  showToast('💾 백업 파일이 저장됐습니다.');
 }catch(e){showToast('파일 저장이 지원되지 않는 환경입니다. 📋 전체 복사를 이용해주세요.');}

function importBackupFile(input){
 const file=input.files&&input.files[0];if(!file)return;

 reader.onload=e=>{const bk=$('bk-in');if(bk)bk.value=e.target.result;restoreBackup();};
 reader.onerror=()=>showToast('파일을 읽지 못했습니다.');
 reader.readAsText(file);
 input.value='';
}

function normAcc(s){return String(s||'').replace(/\s/g,'');}
function parseYmFromFilename(fname){
// 파일명에서 연-월 추출. 지원: 2026.01 / 2026_01 / 2026-01 / 202601 / 2026년1월 / 2026 01
const base=String(fname||'').replace(/\.[^.]+$/,''); // 확장자 제거
// 2026년 1월 형태
let m=base.match(/(20\d{2})\s*년\s*(\d{1,2})\s*월?/);
if(!m)m=base.match(/(20\d{2})[._\-\/\s]+(\d{1,2})(?!\d)/); // 2026.01 / 2026_1 등
if(!m)m=base.match(/(20\d{2})(\d{2})(?!\d)/); // 202601
if(!m)return null;
const y=m[1];const mo=parseInt(m[2],10);
if(mo<1||mo>12)return null;
return`${y}-${String(mo).padStart(2,'0')}`;
}

let _tabDragIdx=null;
let _tabBarDragKey=null;
function tabDragStart(ev,i){_tabDragIdx=i;ev.dataTransfer.effectAllowed='move';ev.currentTarget.style.opacity='0.5';}
// 탭 바 직접 드래그 핸들러
function tabBarDragStart(ev,key){
_tabBarDragKey=key;
ev.dataTransfer.effectAllowed='move';
ev.currentTarget.style.opacity='0.4';
ev.currentTarget.style.borderBottom='2px dashed #1a73e8';
}
function tabBarDragOver(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';ev.currentTarget.style.background='#e8f0fe';}
function tabBarDragEnd(ev){ev.currentTarget.style.opacity='1';ev.currentTarget.style.background='transparent';}
async function tabBarDrop(ev,targetKey){
ev.preventDefault();ev.currentTarget.style.background='transparent';
if(!_tabBarDragKey||_tabBarDragKey===targetKey){_tabBarDragKey=null;return;}
const order=currentTabOrder();
const from=order.indexOf(_tabBarDragKey);
const to=order.indexOf(targetKey);
if(from<0||to<0){_tabBarDragKey=null;return;}
order.splice(from,1);order.splice(to,0,_tabBarDragKey);
S.pl.tabOrder=order;
_tabBarDragKey=null;
await savePL();renderPL(document.getElementById('pl-body'));
}
function tabDragOver(ev){ev.preventDefault();ev.dataTransfer.dropEffect='move';ev.currentTarget.style.background='#eef2fc';}
function tabDropItem(ev,targetIdx){
ev.preventDefault();
const list=document.getElementById('tab-order-list');if(!list||_tabDragIdx==null)return;
const items=Array.from(list.children);
// 현재 순서로 keys 수집
const keys=items.map(el=>el.getAttribute('data-key'));
const dragged=keys.splice(_tabDragIdx,1)[0];
const insertAt=_tabDragIdx<targetIdx?targetIdx:targetIdx;
keys.splice(insertAt,0,dragged);
// DOM 재배치
keys.forEach((k,i)=>{
const el=items.find(e=>e.getAttribute('data-key')===k);
if(el){el.style.opacity='1';el.style.background='#fff';list.appendChild(el);}
});
_tabDragIdx=null;
items.forEach(el=>{el.style.background='#fff';el.style.opacity='1';});
}
function tabDrop(ev){ev.preventDefault();}
function resetTabOrder(){S.pl.tabOrder=Object.keys(TAB_LABELS);openTabOrderManager();}
async function saveTabOrder(){
const list=document.getElementById('tab-order-list');if(!list)return;

}

function plPredictionsHtml(){
const centers=S.pl.centers||[];

aggByMonth[m]=t;
});
const pred={next:{},quarter:{},annual:{}};
fields.forEach(f=>{
const vals=months.map((m,i)=>({x:i,y:aggByMonth[m][f]||0})).filter(d=>d.y>0);
if(!vals.length){pred.next[f]=0;pred.quarter[f]=0;pred.annual[f]=0;return;}
const nextVal=Math.max(0,linPredict(vals,vals.length));
pred.next[f]=nextVal;
pred.quarter[f]=nextVal*3;
pred.annual[f]=nextVal*12;
});
const rows=[['익월 예측',pred.next],['분기 예측 (×3)',pred.quarter],['연간 예측 (×12)',pred.annual]];
return`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px">
<thead><tr style="background:#f8f9fa"><th style="padding:5px 8px;text-align:left;border-bottom:1px solid #e0e0e0">구분</th>${labels.map(l=>`<th style="padding:5px 8px;text-align:right;border-bottom:1px solid #e0e0e0">${l}</th>`).join('')}</tr></thead>
<tbody>${rows.map(([label,p])=>`<tr style="border-bottom:1px solid #f5f5f5"><td style="padding:5px 8px;color:#888">${label}</td>${fields.map(f=>`<td style="padding:5px 8px;text-align:right;color:#1a73e8;font-weight:600">${fmtMoney(Math.round(p[f]))}</td>`).join('')}</tr>`).join('')}
</tbody></table></div><div style="font-size:9px;color:#aaa;margin-top:5px">※ 최근 6개월 데이터 기반 선형 추세 예측. 데이터가 적을수록 정확도 낮음.</div>`;
}
function linPredict(data,nextX){
const n=data.length;
if(n===0)return 0;if(n===1)return data[0].y;
const sx=data.reduce((a,d)=>a+d.x,0),sy=data.reduce((a,d)=>a+d.y,0);
const sxy=data.reduce((a,d)=>a+d.x*d.y,0),sx2=data.reduce((a,d)=>a+d.x*d.x,0);
const denom=n*sx2-sx*sx;if(!denom)return sy/n;
const slope=(n*sxy-sx*sy)/denom;
const intercept=(sy-slope*sx)/n;
return intercept+slope*nextX;
}
function plAnomalyWarn(cur,prev,centerId,thisYM){

}
});
// 2. 이익률 급변 (10%p 이상)
if(cur.revenue&&prev.revenue){

const diff=cr-pr;
if(Math.abs(diff)>=10)msgs.push(`센터이익률 ${diff>0?'+':''}${diff.toFixed(1)}%p ${diff>0?'급등':'급락'}`);

if(idx>=3){

const revVals=last3.map(m=>(getDashRecord(centerId,m,'single')||{}).revenue||null);
const cpVals=last3.map(m=>{const r=getDashRecord(centerId,m,'single')||{};return r.revenue?(r.centerProfit/r.revenue*100):null;});

}
// 이익률 지속 하락/상승
if(cpVals.every(v=>v!=null)){

}
}
return msgs.join(' | ');
}
function getLast6Months(){

}
function getPrevRecord(centerId,ym){

// 대시보드용: 단월이면 해당 월 레코드, 누적이면 연초~선택월 합산 레코드 반환
function getDashRecord(centerId,ym,mode){
const recs=S.pl.records[centerId]||{};
if(mode!=='cumulative')return recs[ym]||null;
const year=ym.slice(0,4);
const endM=parseInt(ym.slice(5),10);
let any=false;
const agg={revenue:0,centerProfit:0,hqProfit:0,totalProfit:0,targetRevenue:0};
const liMap={};
for(let m=1;m<=endM;m++){
const key=`${year}-${String(m).padStart(2,'0')}`;
const r=recs[key];if(!r)continue;
any=true;
agg.revenue+=r.revenue||0;
agg.centerProfit+=r.centerProfit||0;
agg.hqProfit+=r.hqProfit||0;
agg.totalProfit+=r.totalProfit||0;
agg.targetRevenue+=r.targetRevenue||0;
(r.lineItems||[]).forEach(li=>{liMap[li.name]=(liMap[li.name]||0)+(li.value||0);});
}
agg.lineItems=Object.keys(liMap).map(n=>({name:n,value:liMap[n]}));
return any?agg:null;
}
// 목표 조회: 사용자설정(S.pl.targets) 우선, 없으면 매출은 손익가공 targetRevenue fallback
// 반환 {revenue, centerProfit, hqProfit} (만원). 미설정 항목은 null
function getTarget(centerId,ym){
const ut=((S.pl.targets||{})[centerId]||{})[ym]||{};
const rec=(S.pl.records[centerId]||{})[ym]||{};
return{
revenue:ut.revenue!=null?ut.revenue:(rec.targetRevenue||null),
centerProfit:ut.centerProfit!=null?ut.centerProfit:null,
hqProfit:ut.hqProfit!=null?ut.hqProfit:null
};
}
// 단월/누적 목표 합산
function getTargetAgg(centerId,ym,mode){
if(mode!=='cumulative')return getTarget(centerId,ym);
const year=ym.slice(0,4);const endM=parseInt(ym.slice(5),10);
const agg={revenue:null,centerProfit:null,hqProfit:null};
for(let m=1;m<=endM;m++){
const key=`${year}-${String(m).padStart(2,'0')}`;
const t=getTarget(centerId,key);
['revenue','centerProfit','hqProfit'].forEach(k=>{if(t[k]!=null){agg[k]=(agg[k]||0)+t[k];}});
}
return agg;
}
// 전체 센터 목표 합산
function getTargetTotal(ym,mode){
const centers=S.pl.centers||[];
const tot={revenue:null,centerProfit:null,hqProfit:null};
centers.forEach(c=>{const t=getTargetAgg(c.id,ym,mode);['revenue','centerProfit','hqProfit'].forEach(k=>{if(t[k]!=null)tot[k]=(tot[k]||0)+t[k];});});
return tot;
}

}
if(mode!=='cumulative'){
const prev=getPrevRecord(ctr.id,ym);
const warn=plAnomalyWarn(rec,prev,ctr.id,ym);
if(warn)reasons.push({type:'이상징후',detail:warn});
}
if(reasons.length)out.push({id:ctr.id,name:ctr.name,reasons,issue:genCenterIssue(ctr.id,ym,mode,rec)});
});
// 심각도순 정렬: 적자>목표미달>이상징후. 사유 많은 순.
const sev=r=>r.some(x=>x.type==='적자')?3:r.some(x=>x.type==='목표미달')?2:1;
out.sort((a,b)=>sev(b.reasons)-sev(a.reasons)||b.reasons.length-a.reasons.length);
return out;
}
// 센터 1줄 이슈 텍스트 (인건비/경비 과다, 적자 등)
function genCenterIssue(centerId,ym,mode,rec){
rec=rec||getDashRecord(centerId,ym,mode);
if(!rec||!rec.revenue)return'';
const accIdx=buildAccMapIndexFull();
const labor1=categoryTotal(rec,'직접인건비',accIdx)||0;
const labor2=categoryTotal(rec,'간접인건비',accIdx)||0;
const expense=categoryTotal(rec,'경비',accIdx)||0;
const labor=labor1+labor2;
const laborPct=rec.revenue?(labor/rec.revenue*100):0;
const expPct=rec.revenue?(expense/rec.revenue*100):0;
const items=[];
if(laborPct>=80)items.push(`인건비 ${fmtMoney(labor)}(${laborPct.toFixed(1)}%) 과다`);
else if(expPct>=25)items.push(`경비 ${fmtMoney(expense)}(${expPct.toFixed(1)}%) 과다`);
if((rec.hqProfit||0)<0)items.push(`본부이익 적자 ${fmtMoney(rec.hqProfit)}`);
return items.join(' · ');
}
// 한 줄 분석 (대시보드/세부 공통). scope=__all__ 또는 centerId
function genOneLineAnalysis(scope,ym,mode){
const centers=S.pl.centers||[];
let rec;
if(scope==='__all__'){
rec={revenue:0,centerProfit:0,hqProfit:0,totalProfit:0,lineItems:[]};
const liMap={};
centers.forEach(c=>{const r=getDashRecord(c.id,ym,mode);if(!r)return;rec.revenue+=r.revenue||0;rec.centerProfit+=r.centerProfit||0;rec.hqProfit+=r.hqProfit||0;rec.totalProfit+=r.totalProfit||0;(r.lineItems||[]).forEach(li=>{liMap[li.name]=(liMap[li.name]||0)+(li.value||0);});});
rec.lineItems=Object.keys(liMap).map(n=>({name:n,value:liMap[n]}));
}else{
rec=getDashRecord(scope,ym,mode);
}
if(!rec||!rec.revenue)return[];
const accIdx=buildAccMapIndexFull();
const labor=(categoryTotal(rec,'직접인건비',accIdx)||0)+(categoryTotal(rec,'간접인건비',accIdx)||0);
const expense=categoryTotal(rec,'경비',accIdx)||0;
const lp=rec.revenue?(labor/rec.revenue*100):0;
const ep=rec.revenue?(expense/rec.revenue*100):0;
const msgs=[];
if(lp>=70)msgs.push(`💰 인건비 ${fmtMoney(labor)}(${lp.toFixed(1)}%) 발생으로 과도한 인건비 항목 확인 필요`);
if(ep>=20)msgs.push(`📋 경비 ${fmtMoney(expense)}(${ep.toFixed(1)}%) 발생으로 과도한 경비 항목 확인 필요`);
// 매출 추이 분석 (분기 비교, 단월 기준 데이터로 연도내)
const year=ym.slice(0,4);
const qSum=q=>{let s=0,n=0;for(let m=(q-1)*3+1;m<=q*3;m++){const key=`${year}-${String(m).padStart(2,'0')}`;let v=0,has=false;centers.forEach(c=>{if(scope!=='__all__'&&c.id!==scope)return;const r=(S.pl.records[c.id]||{})[key];if(r){v+=r.revenue||0;has=true;}});if(has){s+=v;n++;}}return n?s/n:null;};
const q1=qSum(1),q2=qSum(2);
if(q1!=null&&q2!=null){
const diff=q2-q1;const pct=q1?(diff/Math.abs(q1)*100):0;
if(diff<0&&Math.abs(pct)>=5)msgs.push(`📉 지속적 매출 감소 추이 (1분기 평균 ${fmtMoney(q1)}, 2분기 평균 ${fmtMoney(q2)}, ${fmtMoney(diff)}(${pct.toFixed(1)}%)) 확인 필요`);
else if(diff>0&&Math.abs(pct)>=5)msgs.push(`📈 매출 증가 추이 (1분기 평균 ${fmtMoney(q1)} → 2분기 평균 ${fmtMoney(q2)}, +${pct.toFixed(1)}%)`);
}
if((rec.hqProfit||0)<0)msgs.push(`⚠️ 본부이익 적자 ${fmtMoney(rec.hqProfit)} — 수익구조 점검 필요`);
return msgs;
}
function fmtMoney(v){if(v===''||v===null||v===undefined||isNaN(v))return'-';const eok=v/10000;if(eok===0)return'-';return eok.toFixed(2)+'억';}
// 이익률(%) 계산. 매출 0이면 null
function profitRate(profit,revenue){if(!revenue||isNaN(profit)||isNaN(revenue))return null;return(profit/revenue*100);}
// 목표달성률: 음수 목표 포함. 실적/목표×100 (부호 포함 → 100%초과=미달, 100%미만=초과달성)
// 매출처럼 양수 목표: 100% 미만=미달, 100% 이상=달성 (기존과 동일)
function achieveRate(actual,target){
if(target==null||target===0||isNaN(actual))return null;
return(actual/target)*100;
}
// 달성률 표기 문자열: 음수/양수 목표에 따라 달성·미달 판단
function achieveLabel(pct,target){
if(pct==null)return'-';
const isNegTarget=(target||0)<0;
// 음수 목표: pct<100이면 초과달성(덜 나쁨), pct>100이면 미달(더 나쁨)
// 양수 목표: pct>=100이면 달성, pct<100이면 미달
const isGood=isNegTarget?(pct<=100):(pct>=100);
const label=isNegTarget?(pct<=100?'달성':'목표미달'):(pct>=100?'달성':'목표미달');
return`${pct.toFixed(0)}%(${label})`;
}
// "−1.20억 (−5.3%)" 형태. 금액과 이익률 동반 표기
function fmtProfitRate(profit,revenue){const m=fmtMoney(profit);const r=profitRate(profit,revenue);if(r===null)return m;return`${m} (${r.toFixed(1)}%)`;}
// 률만 색상 span 포함
function rateSpan(profit,revenue){const r=profitRate(profit,revenue);if(r===null)return'';const col=r<0?'#d32f2f':'#34a853';return`<span style="color:${col}">(${r.toFixed(1)}%)</span>`;}

function parseNum(s){
if(s==null||s==='')return 0;
let t=String(s).trim().replace(/[",\s]/g,'');
t=t.replace(/△/g,'-').replace(/\((.*)\)/,'-$1');
const v=parseFloat(t);
return isNaN(v)?0:v;
}
function simpleCsvParse(text){
const lines=text.replace(/\r\n/g,'\n').replace(/\uFEFF/g,'').split('\n').filter(l=>l.length);
const splitLine=l=>{
const out=[];let cur='';let inQ=false;
for(let i=0;i<l.length;i++){
const c=l[i];
if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
else if(c===','&&!inQ){out.push(cur);cur='';}
else cur+=c;
}
out.push(cur);return out;
};
const header=splitLine(lines[0]);
return lines.slice(1).map(l=>{
const cells=splitLine(l);const row={};
header.forEach((h,i)=>{row[h]=cells[i];});
return row;
});
}

// 순수 파싱 함수: 텍스트 → {results}, 신규계정은 mapByName/newAccounts에 누적
function parseRawPLText(text,mapByName,newAccounts){
const rows=simpleCsvParse(text);
if(!rows.length)throw new Error('빈 파일이거나 읽을 수 없습니다.');
const cols=Object.keys(rows[0]);
const centerCols=cols.filter(c=>c!=='계정명'&&c!=='합계');
const nameRow=rows.find(r=>normAcc(r['계정명'])==='계정명');
const codeToName={};
centerCols.forEach(code=>{
const rawNm=(nameRow&&nameRow[code]&&nameRow[code].trim())||'';
const ua=(S.pl&&S.pl.centerAlias)||{};
// 컬럼코드로 직접 매핑된 별칭이 있으면 우선, 없으면 이름 기준
codeToName[code]=ua[code]||resolveCenterAlias(rawNm)||rawNm||code;
});
const dataRows=rows.filter(r=>normAcc(r['계정명'])!=='계정명'&&r['계정명']&&r['계정명'].trim());
dataRows.forEach(r=>{
const key=normAcc(r['계정명']);
if(!mapByName[key]){
const ent={id:'am_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:r['계정명'].trim(),category:'미분류',level:'세부항목',role:'',parent:null,auto:true};
mapByName[key]=ent;newAccounts.push(ent);
}
});
const results=centerCols.map(code=>{
let revenue=0,centerProfit=0;
const lineItems=[];
dataRows.forEach(r=>{
const key=normAcc(r['계정명']);
const m=mapByName[key];
const v=parseNum(r[code]);
if(m&&m.role==='revenue')revenue+=v;
if(m&&m.role==='profit')centerProfit+=v;
if(m&&(m.level==='중분류'||m.level==='세부항목')){
lineItems.push({name:m.name,value:Math.round(v/10000)});
}
});
revenue=Math.round(revenue/10000);
centerProfit=Math.round(centerProfit/10000);
return{code,rawName:codeToName[code],revenue,centerProfit,lineItems};
});
return{results};
}

// ── 손익가공 파서 (행=센터, 열=월별 지표) ──────────────────────────
// CSV 구조: row0=대분류헤더, row1=지표헤더, row2~=센터데이터
// 월 블록: '매출' 헤더가 9칸 간격으로 반복(마지막은 연누계=제외)
// 블록 내: +0 매출, +1 목표대비(=실적-목표), +3 센터이익, +5 본부이익, +8 전사이익
function rawCsvToMatrix(text){
// 따옴표 내 줄바꿈/쉼표를 보존하는 전체 파싱
const src=text.replace(/\r\n/g,'\n').replace(/\uFEFF/g,'');
const rows=[];let row=[];let cur='';let inQ=false;
for(let i=0;i<src.length;i++){
const c=src[i];
if(c==='"'){if(inQ&&src[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
else if(c===','&&!inQ){row.push(cur);cur='';}
else if(c==='\n'&&!inQ){row.push(cur);rows.push(row);row=[];cur='';}
else cur+=c;
}
if(cur!==''||row.length){row.push(cur);rows.push(row);}
return rows;
}
function parseProcessedPL(text,startYm){
const M=rawCsvToMatrix(text);
if(M.length<3)throw new Error('손익가공 파일 형식이 아닙니다(행 부족).');
const headerRow=M[1].map(c=>String(c||'').trim());
// '매출' 헤더 열들 찾기 → 마지막(연누계) 제외
const salesCols=[];headerRow.forEach((h,i)=>{if(h==='매출')salesCols.push(i);});
if(salesCols.length<2)throw new Error('월별 매출 컬럼을 찾지 못했습니다.');
const monthCols=salesCols.slice(0,-1); // 마지막은 연누계
// 시작월 → 각 블록의 ym 매핑
const [sy,sm]=startYm.split('-').map(Number);
const monthYms=monthCols.map((_,idx)=>{
const d=new Date(sy,sm-1+idx,1);
return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
});
// 센터 데이터 행 (row2~), col0=서비스코드
const centerRows=[];
for(let r=2;r<M.length;r++){
const code=String(M[r][0]||'').trim();
if(!code)continue;
centerRows.push({rowIdx:r,code});
}
// 센터별 × 월별 추출 (ASP_ 접두어 → 별도 센터로 관리)
const byCenter={};
const aspFlag={};// centerName → true/false
centerRows.forEach(({rowIdx,code})=>{
const isAsp=code.startsWith('ASP_');
const baseCode=isAsp?code.slice(4):code;
const centerName=resolveCenterAlias(code)||resolveCenterAlias(baseCode)||baseCode;
aspFlag[centerName]=isAsp;
if(!byCenter[centerName])byCenter[centerName]={};
monthCols.forEach((sc,mi)=>{
const ym=monthYms[mi];
const rev=parseNum(M[rowIdx][sc]);
const goalGap=parseNum(M[rowIdx][sc+1]);// 목표대비(실적-목표)
const cProfit=parseNum(M[rowIdx][sc+3]);
const hProfit=parseNum(M[rowIdx][sc+5]);
const tProfit=parseNum(M[rowIdx][sc+8]);
// 빈 데이터(전부 0이고 원문이 nan)면 스킵
const rawRev=String(M[rowIdx][sc]||'').trim();
if(rawRev===''||rawRev.toLowerCase()==='nan'||rawRev==='#VALUE!'){
// 매출이 비어도 이익이 있을 수 있으나, 전부 비면 스킵
if(!cProfit&&!hProfit&&!tProfit)return;
}
const target=rev-goalGap;// 목표매출 역산
if(!byCenter[centerName][ym])byCenter[centerName][ym]={revenue:0,centerProfit:0,hqProfit:0,totalProfit:0,targetRevenue:0};
const slot=byCenter[centerName][ym];
slot.revenue+=Math.round(rev/10000);
slot.centerProfit+=Math.round(cProfit/10000);
slot.hqProfit+=Math.round(hProfit/10000);
slot.totalProfit+=Math.round(tProfit/10000);
slot.targetRevenue+=Math.round(target/10000);
});
});
return{months:monthYms,byCenter,aspFlag};
}

}else{

function handlePLFile(ev){

function exportPLCSV(){
const centers=S.pl.centers||[];
if(!centers.length){alert('데이터가 없습니다.');return;}
const allYMs=new Set();
centers.forEach(c=>Object.keys(S.pl.records[c.id]||{}).forEach(m=>allYMs.add(m)));
const yms=Array.from(allYMs).sort();
const rows=[['센터','연월','매출(만원)','센터이익(만원)','센터이익률(%)','본부이익(만원)','본부이익률(%)','전사이익(만원)','전사이익률(%)']];
centers.forEach(ctr=>{
yms.forEach(ym=>{
const r=(S.pl.records[ctr.id]||{})[ym]||{};
if(!r.revenue&&!r.centerProfit&&!r.hqProfit&&!r.totalProfit)return;
const cr=r.revenue?(r.centerProfit/r.revenue*100).toFixed(1):'';
const hr=r.revenue?(r.hqProfit/r.revenue*100).toFixed(1):'';
const tr=r.revenue?(r.totalProfit/r.revenue*100).toFixed(1):'';
rows.push([ctr.name,ym,r.revenue||0,r.centerProfit||0,cr,r.hqProfit||0,hr,r.totalProfit||0,tr]);
});
});
const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
const a=document.createElement('a');a.href=URL.createObjectURL(blob);
a.download=`손익데이터_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function buildDataContext(){
const centers=S.pl.centers||[];
const accIdx=buildAccMapIndexFull();
const allYMs=getAllYMs();
// 백만원 단위 변환 (만원 ÷ 100)
const toM=v=>v!=null?(v/100).toFixed(2):'0';
let ctx=`[담당 센터: ${centers.map(c=>c.name).join(', ')}]\n[데이터 보유 월: ${allYMs.join(', ')}]\n※ 금액 단위: 백만원\n\n`;
centers.forEach(c=>{
const recs=S.pl.records[c.id]||{};
const months=Object.keys(recs).sort();
if(!months.length)return;
ctx+=`■ ${c.name}${c.asp?' [ASP센터]':''}\n`;
months.forEach(ym=>{
const r=recs[ym];
ctx+=`  ${ym}: 매출 ${toM(r.revenue)}, 센터이익 ${toM(r.centerProfit)}, 본부이익 ${toM(r.hqProfit)}, 전사이익 ${toM(r.totalProfit)}`;
const tgt=getTarget(c.id,ym);
if(tgt.revenue!=null||tgt.hqProfit!=null)ctx+=` [목표-매출 ${toM(tgt.revenue)}, 본부이익 ${toM(tgt.hqProfit)}]`;
if(r.lineItems&&r.lineItems.length){
// 카테고리별로 세부항목 목록 (이름+백만원값)
const byCat={};
r.lineItems.forEach(li=>{
const m=lookupAcc(accIdx,li.name);
const cat=m?m.category:'미분류';
if(!byCat[cat])byCat[cat]=[];
byCat[cat].push(`${li.name}:${toM(li.value)}`);
});
Object.keys(byCat).forEach(cat=>{ctx+=`\n    [${cat}] ${byCat[cat].join(' / ')}`;});
}
ctx+=`\n`;
});
// 부진센터 사유 히스토리 (있는 경우만)
const issues=S.pl.issues&&S.pl.issues[c.id];
if(issues&&Object.keys(issues).length){
ctx+=`  [부진센터사유히스토리]\n`;

}
});
// 전체 메모 히스토리
if(S.pl.memos&&S.pl.memos.length){
ctx+=`[전체 메모 히스토리]\n`;
[...S.pl.memos].slice(-10).forEach(m=>{ctx+=`  ${new Date(m.ts).toLocaleDateString('ko-KR')}: ${m.text.slice(0,200)}\n`;});
}
return ctx;
}

// 손익목표 파서. 행=센터, 매출블록/본부이익블록(각 계+12개월). 단위 백만원→만원(×100)
function parseTargetCsv(text,fname){
const M=rawCsvToMatrix(text);
if(M.length<3)throw new Error('목표 파일 형식이 아닙니다(행 부족).');
const h0=M[0].map(c=>String(c||'').trim());
const h1=M[1].map(c=>String(c||'').trim());
// 대분류 헤더에서 '매출'/'본부이익' 시작 열 찾기
let revStart=-1,hqStart=-1;
h0.forEach((h,i)=>{if(h.replace(/\s/g,'').includes('매출'))revStart=i;if(h.replace(/\s/g,'').includes('본부이익'))hqStart=i;});
if(revStart<0)throw new Error('매출액 목표 열을 찾지 못했습니다.');
// 각 블록에서 월(1~12) 열 매핑: 헤더가 'N월'
function monthCols(start){
const map={};
for(let i=start;i<h1.length;i++){
const mm=h1[i].match(/^(\d{1,2})월$/);
if(mm){const mo=parseInt(mm[1],10);if(mo>=1&&mo<=12&&map[mo]===undefined)map[mo]=i;}
// 다음 블록 시작(다른 대분류)에 도달하면 중단
if(i>start&&h0[i]&&h0[i].trim()&&!/^\s*$/.test(h0[i])&&i!==start)break;
}
return map;
}
const revMonthCols=monthCols(revStart);
const hqMonthCols=hqStart>=0?monthCols(hqStart):{};
const year=(fname.match(/(20\d{2})/)||[])[1]||String(new Date().getFullYear());
const byCenter={};
for(let r=2;r<M.length;r++){
const code=String(M[r][0]||'').trim();
if(!code)continue;
const isAsp=code.startsWith('ASP_');
const cName=resolveCenterAlias(code)||(isAsp?'ASP_'+resolveCenterAlias(code.slice(4)):resolveCenterAlias(code));
if(!byCenter[cName])byCenter[cName]={};
for(let mo=1;mo<=12;mo++){
const ym=`${year}-${String(mo).padStart(2,'0')}`;
const rc=revMonthCols[mo],hc=hqMonthCols[mo];
const revV=rc!=null?parseNum(M[r][rc]):0;
const hqV=hc!=null?parseNum(M[r][hc]):0;
if(revV===0&&hqV===0&&(!M[r][rc]||String(M[r][rc]).trim()==='-'))continue;
if(!byCenter[cName][ym])byCenter[cName][ym]={revenue:0,hqProfit:0};
byCenter[cName][ym].revenue+=Math.round(revV*100); // 백만원→만원
byCenter[cName][ym].hqProfit+=Math.round(hqV*100);

async function saveCellEdit(centerId,ym,kind,key){

rec[key]=val;

}else{

let li=rec.lineItems.find(x=>x.name===key);

if(rec.monthLocked){out.push({centerId:c.id,centerName:c.name,ym,kind:'month',key:'__month__',label:'월 전체 확정',value:rec.revenue});return;}
