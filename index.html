// 미분류 계정명으로 분류 제안 (키워드 기반)
function suggestCategory(name){
const n=String(name||'').replace(/\s/g,'');
const rules=[
[/급여|급료|임금|상여|수당|퇴직|인건|복리후생|4대보험|국민연금|건강보험|고용보험|산재/,'직접인건비'],
[/임차|임대|관리비|건물|사무실/,'경비'],
[/통신|전화|회선|인터넷|전용회선/,'경비'],
[/감가상각|상각/,'경비'],
[/세금|공과|부담금/,'경비'],
[/전력|수도|전기|가스|수도광열/,'경비'],
[/소모품|비품|사무용품/,'경비'],
[/수선|수리|유지보수/,'경비'],
[/보험료/,'경비'],
[/지급수수료|수수료|용역|외주|위탁/,'경비'],
[/교육|훈련/,'간접인건비'],
[/여비|교통|출장/,'경비'],
[/광고|선전|판촉/,'경비'],
[/매출|수익|영업수익/,'매출'],
[/이익/,'이익'],
];
for(const[re,cat]of rules){if(re.test(n))return cat;}
return '경비'; // 기본 제안
}
function computeVerifyRows(ym){
const centers=S.pl.centers||[];
const accIdx=buildAccMapIndexFull();
const rows=[];
centers.forEach(c=>{
const rec=(S.pl.records[c.id]||{})[ym];
if(!rec)return;
const hasItems=rec.lineItems&&rec.lineItems.length;
// 매출: 저장 revenue와 동일 기준(role==='revenue')으로 재계산. 미분류는 별도 집계
let revSum=null,unclassified=0;
const unclassifiedItems=[];
if(hasItems){
revSum=0;
rec.lineItems.forEach(li=>{const m=lookupAcc(accIdx,li.name);if(!m){unclassified+=li.value;unclassifiedItems.push({name:li.name,value:li.value});return;}if(m.category==='미분류'){unclassified+=li.value;unclassifiedItems.push({name:li.name,value:li.value});}if(m.role==='revenue')revSum+=li.value;});
}
const items=[];
// 매출 검증: lineItems에 revenue-role 항목이 있을 때만 의미. (손익가공만 있는 경우 revSum=0이므로 제외)
if(hasItems&&revSum>0){
const diff=(rec.revenue||0)-revSum;
items.push({key:'revenue',label:'매출',stored:rec.revenue||0,calc:revSum,diff,match:Math.abs(diff)<1});
}
// 미분류 잔액 경고 (세부 항목 동봉)
if(unclassifiedItems.length){
items.push({key:'__unclassified__',label:'미분류 항목',stored:null,calc:unclassified,diff:unclassified,match:false,uItems:unclassifiedItems});
}
if(items.length)rows.push({cid:c.id,cName:c.name,items,hasItems});
});
return rows;
}

let html=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap">
<button class="btn-o" style="font-size:13px;padding:5px 9px;line-height:1" title="이전 월" onclick="setCompareYm('${prevYm}')">‹</button>
<select onchange="setCompareYm(this.value)" style="padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:inherit">${ymOptions}</select>
<button class="btn-o" style="font-size:13px;padding:5px 9px;line-height:1" title="다음 월" onclick="setCompareYm('${nextYm}')">›</button>
<span style="font-size:10px;color:#aaa">선택한 달 기준, 센터를 나란히 비교합니다. 금액을 더블클릭하면 수정·확정할 수 있습니다.</span>
</div>`;
html+=`<div class="scard" id="pl-export-area"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><h4 style="margin:0">📊 ${ym} 센터 비교</h4>${exportButtonsHtml()}</div>
<div style="overflow-x:auto;margin-top:6px"><table style="width:100%;border-collapse:collapse;font-size:10px">
<thead><tr style="background:#f8f9fa">
<th style="padding:5px 6px;text-align:left;border-bottom:1px solid #e0e0e0;position:sticky;left:0;background:#f8f9fa;min-width:90px">구분</th>
${centers.map(c=>`<th style="padding:5px 6px;text-align:right;border-bottom:1px solid #e0e0e0;white-space:nowrap">${escAttr(c.name)}</th>`).join('')}
<th style="padding:5px 6px;text-align:right;border-bottom:1px solid #e0e0e0;background:#f0f4ff">합계</th>
</tr></thead><tbody>`;
cats.forEach(cat=>{
const vals={};centers.forEach(c=>{vals[c.id]=catVal(recByCenter[c.id],cat);});
const present=centers.map(c=>vals[c.id]).filter(v=>v!=null);
const sum=present.length?present.reduce((s,v)=>s+v,0):null;
const isExp=cat.mode==='cat'&&expandedCats.has(cat.key);
const isProfit=cat.key==='centerProfit'||cat.key==='hqProfit'||cat.key==='totalProfit';
const sumRev=centers.reduce((s,c)=>{const r=recByCenter[c.id];return s+(r?r.revenue||0:0);},0);
html+=`<tr style="border-bottom:1px solid #f5f5f5;cursor:${cat.mode==='cat'?'pointer':'default'};background:#fff" ${cat.mode==='cat'?`onclick="toggleCatExpand('${cat.key}')"`:''}>
<td style="padding:5px 6px;font-weight:700;position:sticky;left:0;background:#fff">${cat.mode==='cat'?(isExp?'▾ ':'▸ '):''}${cat.label}${isProfit?'<span style="font-size:8px;color:#aaa">(률)</span>':''}</td>
${centers.map(c=>{
const opts=cat.mode==='field'?{editable:true,centerId:c.id,kind:'field',key:cat.key,locked:lockOf(recByCenter[c.id],'field',cat.key)}:{};
if(isProfit){const rec=recByCenter[c.id];const rev=rec?rec.revenue||0:0;opts.rate=rateSpan(vals[c.id]||0,rev);}
return cellHtml(vals[c.id],true,opts);
}).join('')}
<td style="padding:5px 6px;text-align:right;font-weight:700;background:#f7f9ff">${sum==null?'—':fmtMoney(sum)}${isProfit&&sumRev?' '+rateSpan(sum||0,sumRev):''}</td>
</tr>`;
if(cat.mode==='cat'&&isExp){
const midNames=new Set();
centers.forEach(c=>{const r=recByCenter[c.id];if(r&&r.lineItems)r.lineItems.forEach(li=>{const am=lookupAcc(accIdx,li.name);if(am&&am.category===cat.key&&am.level==='중분류')midNames.add(li.name);});});
Array.from(midNames).forEach(midName=>{
const midKey=cat.key+'::'+midName;
const midVals={};centers.forEach(c=>{
const r=recByCenter[c.id];
if(!r||!r.lineItems){midVals[c.id]=null;return;}
const li=r.lineItems.find(x=>x.name===midName);
midVals[c.id]=li?li.value:0;
});
const presentM=centers.map(c=>midVals[c.id]).filter(v=>v!=null);
const msum=presentM.length?presentM.reduce((s,v)=>s+v,0):null;
const midExp=expandedMid.has(midKey);
html+=`<tr style="border-bottom:1px solid #f5f5f5;cursor:pointer;background:#fafbff" onclick="event.stopPropagation();toggleMidExpand('${midKey.replace(/'/g,"\\'")}')">
<td style="padding:4px 6px 4px 18px;font-weight:600;color:#444;position:sticky;left:0;background:#fafbff">${midExp?'▾ ':'▸ '}${escAttr(midName)}</td>
${centers.map(c=>cellHtml(midVals[c.id],false,{editable:true,centerId:c.id,kind:'item',key:midName,locked:lockOf(recByCenter[c.id],'item',midName)})).join('')}
<td style="padding:4px 6px;text-align:right;font-weight:600;background:#eef2fc">${msum==null?'—':fmtMoney(msum)}</td>
</tr>`;
if(midExp){
const detailNames=new Set();
centers.forEach(c=>{const r=recByCenter[c.id];if(r&&r.lineItems)r.lineItems.forEach(li=>{const am=lookupAcc(accIdx,li.name);if(am&&am.category===cat.key&&am.level==='세부항목'&&am.parent===midName)detailNames.add(li.name);});});
Array.from(detailNames).forEach(dn=>{
const dVals={};centers.forEach(c=>{
const r=recByCenter[c.id];
if(!r||!r.lineItems){dVals[c.id]=null;return;}
const li=r.lineItems.find(x=>x.name===dn);
dVals[c.id]=li?li.value:0;
});
const presentD=centers.map(c=>dVals[c.id]).filter(v=>v!=null);
const dsum=presentD.length?presentD.reduce((s,v)=>s+v,0):null;
html+=`<tr style="border-bottom:1px solid #fafafa;background:#fcfcff"><td style="padding:3px 6px 3px 32px;color:#999;font-size:9px;position:sticky;left:0;background:#fcfcff">${escAttr(dn)}</td>
${centers.map(c=>cellHtml(dVals[c.id],false,{editable:true,centerId:c.id,kind:'item',key:dn,locked:lockOf(recByCenter[c.id],'item',dn)})).join('')}
<td style="padding:3px 6px;text-align:right;color:#999;font-size:9px;background:#f4f6fc">${dsum==null?'—':fmtMoney(dsum)}</td></tr>`;
});
}
});
}
});
html+=`</tbody></table></div></div>`;
return html;
}
async function plInit(){if(!S.centers)S.centers=[];if(!S.records)S.records={};
if(!S.pl)S.pl={centers:[],records:{}};
if(!S.pl.accountMap)S.pl.accountMap=JSON.parse(JSON.stringify(ACCOUNT_MAP_DEFAULT));
ensureUiState();
restoreDashState();
if(!S.pl.centers.length){
S.pl.centers=['KB손보부천','KB손보정비','케이뱅크','LG전자AS','LG전자성수기','평택시청','이니텍'].map((name,i)=>({id:'plc_seed_'+i,name}));
S.pl.centers.forEach(c=>{if(!S.pl.records[c.id])S.pl.records[c.id]={};});
await savePL();
}
renderPL(document.getElementById('pl-body'));}
// [통합버전 제거: 캘린더 공통함수 사용]

(async function init(){
  await loadS();
  // PL 데이터 로드 (별도 Supabase 키)
  if (!S.pl) S.pl = {centers:[], records:{}, accountMap: null};
  await loadPL();
  const n=new Date();cY=n.getFullYear();cM=n.getMonth();curP='workspace';markSb('sb-workspace');render();
  // PL init (데이터 초기화만, 렌더링은 탭 전환 시)
  await plInit();
})();
</script>
